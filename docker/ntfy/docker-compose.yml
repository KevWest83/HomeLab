services:
  ntfy:
    image: binwiederhier/ntfy:latest
    container_name: ntfy
    restart: unless-stopped
    ports:
      - "8080:80"   # HTTP only; Caddy handles HTTPS termination
    volumes:
      - /mnt/ntfy-data:/data
      - ./server.yml:/data/server.yml:ro
    command: serve --config /data/server.yml
    networks:
      - default
      - monitoring_shared

networks:
  monitoring_shared:
    external: true
